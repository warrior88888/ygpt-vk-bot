name: Main ygpt-vk-bot Workflow

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'docs/'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Install dependencies
        run: uv sync --frozen
      - name: Ruff
        run: uv run ruff check . --fix
      - name: Ty
        run: uv run ty check .

  build-and-push:
    name: Push bot image to DockerHub
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/ygpt-vk-bot:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: actions/checkout@v6
      - name: Copy configs to VPS
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          passphrase: ${{ secrets.PASSPHRASE }}
          port: ${{ secrets.PORT }}
          source: "docker-compose.yml"
          target: "/opt/ygpt-vk-bot"
      - name: Create .env and restart images
        uses: appleboy/ssh-action@master
        env:
          VK_API_KEY: ${{ secrets.BOT__VK__API_KEY }}
          YANDEX_API_KEY: ${{ secrets.BOT__YANDEX__API_KEY }}
          YANDEX_FOLDER_ID: ${{ secrets.BOT__YANDEX__FOLDER_ID }}
          YANDEX_MODEL_URI: ${{ secrets.BOT__YANDEX__MODEL_URI }}
          YANDEX_TEMPERATURE: ${{ secrets.BOT__YANDEX__TEMPERATURE }}
          YANDEX_MAX_TOKENS: ${{ secrets.BOT__YANDEX__MAX_TOKENS }}
          REDIS_PASSWORD: ${{ secrets.BOT__REDIS__PASSWORD }}
          REDIS_PORT: ${{ secrets.BOT__REDIS__PORT }}
          LOG_LEVEL: ${{ secrets.BOT__LOG__LEVEL }}
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          passphrase: ${{ secrets.PASSPHRASE }}
          port: ${{ secrets.PORT }}
          envs: VK_API_KEY,YANDEX_API_KEY,YANDEX_FOLDER_ID,YANDEX_MODEL_URI,YANDEX_TEMPERATURE,YANDEX_MAX_TOKENS,REDIS_PASSWORD,REDIS_PORT,LOG_LEVEL
          script: |
            cd /opt/ygpt-vk-bot
            {
              printf 'BOT__VK__API_KEY=%s\n'           "$VK_API_KEY"
              printf 'BOT__YANDEX__API_KEY=%s\n'       "$YANDEX_API_KEY"
              printf 'BOT__YANDEX__FOLDER_ID=%s\n'     "$YANDEX_FOLDER_ID"
              printf 'BOT__YANDEX__MODEL_URI=%s\n'     "$YANDEX_MODEL_URI"
              printf 'BOT__YANDEX__TEMPERATURE=%s\n'   "$YANDEX_TEMPERATURE"
              printf 'BOT__YANDEX__MAX_TOKENS=%s\n'    "$YANDEX_MAX_TOKENS"
              printf 'BOT__REDIS__PASSWORD=%s\n'       "$REDIS_PASSWORD"
              printf 'BOT__REDIS__PORT=%s\n'           "$REDIS_PORT"
              printf 'BOT__LOG__LEVEL=%s\n'            "$LOG_LEVEL"
            } > .env
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -af

  notify:
    runs-on: ubuntu-latest
    needs: deploy
    if: always()
    steps:
      - name: Notify success
        if: needs.deploy.result == 'success'
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            ygpt-vk-bot deployed successfully!
            Commit: ${{ github.event.head_commit.message }}
            Author: ${{ github.event.head_commit.author.name }}
      - name: Notify failure
        if: needs.deploy.result == 'failure'
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            Deploy failed!
            Commit: ${{ github.event.head_commit.message }}
            Info: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
